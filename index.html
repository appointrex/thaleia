<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thaleia Holiday Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    padding: 2rem;
  }

  .logo {
    color: #c9a96e;
    font-size: 1.1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    opacity: 0.8;
  }

  h1 {
    color: #fff;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
    text-align: center;
  }

  .subtitle {
    color: #888;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    margin-bottom: 3rem;
    text-align: center;
  }

  .buttons {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .btn {
    background: transparent;
    border: 1px solid #c9a96e;
    color: #c9a96e;
    padding: 1rem 2.5rem;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Georgia', serif;
    border-radius: 2px;
    min-width: 160px;
  }

  .btn:hover { background: #c9a96e; color: #0a0a0a; }
  .btn.active { background: #c9a96e; color: #0a0a0a; }

  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 1000;
    flex-direction: column;
  }

  .overlay.open { display: flex; }

  .close-bar {
    background: rgba(0,0,0,0.8);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
  }

  .close-bar span {
    color: #c9a96e;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .close-btn {
    background: transparent;
    border: 1px solid #c9a96e;
    color: #c9a96e;
    width: 36px; height: 36px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .close-btn:hover { background: #c9a96e; color: #000; }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    margin-top: 48px;
  }

  .decoration {
    width: 60px;
    height: 1px;
    background: #c9a96e;
    margin: 0 auto 2rem;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="logo">Welcome to</div>
<h1>Thaleia Holiday Home</h1>
<div class="decoration"></div>
<p class="subtitle">Select your language</p>

<div class="buttons">
  <button class="btn" onclick="openVideo('english', 'English')">🇬🇧 English</button>
  <button class="btn" onclick="openVideo('romanian', 'Romanian')">🇷🇴 Romanian</button>
  <button class="btn" onclick="openVideo('bulgarian', 'Bulgarian')">🇧🇬 Bulgarian</button>
</div>

<div class="overlay" id="overlay">
  <div class="close-bar">
    <span id="video-label">English</span>
    <button class="close-btn" onclick="closeVideo()">✕</button>
  </div>
  <iframe id="video-frame" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<script>
const videos = {
  english:  'https://drive.google.com/file/d/1WVOv3b4aS-iaVXd9_EsoIVwf70zC0dIk/preview',
  bulgarian:'https://drive.google.com/file/d/1rdNhSs_8AoQt8umPGT5Ffvn7cX-Vc8ss/preview',
  romanian: 'https://drive.google.com/file/d/1e3WpgE_r8qhQubSpHdSm4n5vjURFIvXG/preview'
};

function openVideo(lang, label) {
  document.getElementById('video-frame').src = videos[lang];
  document.getElementById('video-label').textContent = label;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeVideo() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('video-frame').src = '';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeVideo();
});
</script>
</body>
</html>
